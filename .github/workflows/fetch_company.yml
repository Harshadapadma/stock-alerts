name: Fetch Company History

on:
  workflow_dispatch:
    inputs:
      symbol:
        description: 'NSE symbol'
        required: true

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests pdfplumber

      - name: Fetch company history
        run: python fetch_company.py "${{ github.event.inputs.symbol }}"

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/
          git diff --staged --quiet || git commit -m "data: ${{ github.event.inputs.symbol }} [skip ci]"
          git push
