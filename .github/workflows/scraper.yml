name: Stock Alert Monitor

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-announcements:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore seen IDs cache
        uses: actions/cache@v4
        with:
          path: seen_ids.json
          key: seen-ids-cache-${{ github.run_id }}
          restore-keys: seen-ids-cache-

      - name: Create config.py from secrets
        run: |
          cat > config.py << 'EOF'
          import os
          class Config:
              EMAIL_ENABLED = True
              DEEPSEEK_API_KEY = os.getenv("DEEPSEEK_API_KEY", "")
              EMAIL_FROM = os.getenv("EMAIL_FROM", "")
              EMAIL_PASSWORD = os.getenv("EMAIL_PASSWORD", "")
              _to_env = os.getenv("EMAIL_TO", "")
              EMAIL_TO = [e.strip() for e in _to_env.split(",") if e.strip()]
              TELEGRAM_ENABLED = bool(os.getenv("TELEGRAM_BOT_TOKEN"))
              TELEGRAM_BOT_TOKEN = os.getenv("TELEGRAM_BOT_TOKEN", "")
              TELEGRAM_CHAT_ID = os.getenv("TELEGRAM_CHAT_ID", "")
              WHATSAPP_ENABLED = bool(os.getenv("META_ACCESS_TOKEN"))
              META_PHONE_NUMBER_ID = os.getenv("META_PHONE_NUMBER_ID", "")
              META_ACCESS_TOKEN = os.getenv("META_ACCESS_TOKEN", "")
              _wa_env = os.getenv("WHATSAPP_TO", "")
              WHATSAPP_TO = [n.strip() for n in _wa_env.split(",") if n.strip()]
              SKIP_PROCEDURAL = True
              MARKET_CAP_MIN_CR = 1000
          EOF

      - name: Run alert check
        env:
          EMAIL_FROM:           ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD:       ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO:             ${{ secrets.EMAIL_TO }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          META_PHONE_NUMBER_ID: ${{ secrets.META_PHONE_NUMBER_ID }}
          META_ACCESS_TOKEN:    ${{ secrets.META_ACCESS_TOKEN }}
          WHATSAPP_TO:          ${{ secrets.WHATSAPP_TO }}
          DEEPSEEK_API_KEY:     ${{ secrets.DEEPSEEK_API_KEY }}
        run: python scraper.py --once

      - name: Save seen IDs cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: seen_ids.json
          key: seen-ids-cache-${{ github.run_id }}

      - name: Commit updated announcements to repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f announcements.json 2>/dev/null || true
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update announcements [skip ci]"
          for attempt in 1 2 3 4 5; do
            git pull --rebase origin main
            git push && break
            echo "Push failed (attempt $attempt), retrying..."
            git reset HEAD~1
            sleep $((attempt * 3))
          done
