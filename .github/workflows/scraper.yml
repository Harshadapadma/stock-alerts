name: Stock Alert Monitor

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  check-announcements:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore seen IDs cache
        uses: actions/cache@v4
        with:
          path: seen_ids.json
          key: seen-ids-cache-${{ github.run_id }}
          restore-keys: seen-ids-cache-

      - name: Run alert check
        env:
          # Email
          EMAIL_FROM:         ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD:     ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO:           ${{ secrets.EMAIL_TO }}

          # Telegram
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}

          # Twilio WhatsApp
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:  ${{ secrets.TWILIO_AUTH_TOKEN }}
          WHATSAPP_FROM:      ${{ secrets.WHATSAPP_FROM }}
          WHATSAPP_TO:        ${{ secrets.WHATSAPP_TO }}

          # DeepSeek AI
          DEEPSEEK_API_KEY:   ${{ secrets.DEEPSEEK_API_KEY }}

        run: python scraper.py --once

      - name: Save seen IDs cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: seen_ids.json
          key: seen-ids-cache-${{ github.run_id }}
